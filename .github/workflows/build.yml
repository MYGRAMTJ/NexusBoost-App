name: Build APK Ultra
on: [push, pull_request, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install System Essentials
        run: |
          sudo apt update
          sudo apt install -y build-essential libtool-bin pkg-config autoconf automake \
            libffi-dev gettext libssl-dev cmake ant python3-dev zip unzip openjdk-17-jdk

      - name: Install Python Environment
        run: |
          python -m pip install --upgrade pip
          pip install "cython<3.0" buildozer virtualenv setuptools

      - name: Build APK with Auto-Fix
        run: |
          mkdir -p ~/.android
          touch ~/.android/repositories.cfg
          # Аввал тоза мекунем, ки хатои кӯҳна намонад
          buildozer android clean
          # Оғози сохтан бо тасдиқи автоматӣ
          yes | buildozer -v android debug
        env:
          BUILDOZER_ALLOW_KIVY_ITERABLE_ERROR: 1
          ACCEPT_SDK_LICENSE: "yes"

      - name: Find and Upload APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: NexusBoost-App
          # Ин сатр худаш файлро меёбад, ҳатто агар дар ҷои ғайричашмдошт бошад
          path: bin/*.apk
