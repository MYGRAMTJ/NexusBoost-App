name: Build APK NexusBoost Final
on: [push, pull_request, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential libtool-bin pkg-config autoconf automake \
            libffi-dev gettext libssl-dev cmake ant python3-dev zip unzip openjdk-17-jdk

      - name: Build APK
        timeout-minutes: 60
        run: |
          pip install --upgrade pip
          pip install "cython<3.0" buildozer virtualenv setuptools
          mkdir -p ~/.android
          touch ~/.android/repositories.cfg
          # Тоза кардани файлҳои вазнин пеш аз сохтан
          find . -name "*test*" -type d -exec rm -rf {} +
          # Оғози сохтан
          yes | buildozer -v android debug
        env:
          BUILDOZER_ALLOW_KIVY_ITERABLE_ERROR: 1
          ACCEPT_SDK_LICENSE: "yes"

      - name: Upload APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: NexusBoost-App
          path: bin/*.apk
