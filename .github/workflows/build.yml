name: Build APK
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y libtool-bin pkg-config autoconf automake libffi-dev gettext
          pip install --upgrade buildozer cython==0.29.33

      - name: Build with Buildozer
        run: |
          # Қабули автоматӣ барои ҳамаи лицензияҳои Android
          mkdir -p ~/.android
          touch ~/.android/repositories.cfg
          yes | buildozer android debug
        env:
          BUILDOZER_ALLOW_KIVY_ITERABLE_ERROR: 1
          # Ин сатр барои гузаштан аз хатогиҳои Aidl кумак мекунад
          ACCEPT_SDK_LICENSE: "yes"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: NexusBoost-APK
          path: bin/*.apk
