name: Build APK Final
on: [push, pull_request, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install System Essentials
        run: |
          sudo apt update
          sudo apt install -y build-essential libtool-bin pkg-config autoconf automake \
            libffi-dev gettext libssl-dev cmake ant python3-dev zip unzip openjdk-17-jdk

      - name: Install Python Environment
        run: |
          python -m pip install --upgrade pip
          pip install "cython<3.0" buildozer virtualenv setuptools

      - name: Build with Buildozer
        timeout-minutes: 60
        run: |
          mkdir -p ~/.android
          touch ~/.android/repositories.cfg
          # Ин сатри муҳимтарин:
          yes | buildozer -v android debug

      - name: Upload APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: NexusBoost-App
          path: bin/*.apk
