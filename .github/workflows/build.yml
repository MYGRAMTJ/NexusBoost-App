name: Build APK Fast Mode
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache Buildozer
        uses: actions/cache@v4
        with:
          path: .buildozer
          key: ${{ runner.os }}-buildozer-${{ hashFiles('buildozer.spec') }}

      - name: Install Dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential libtool-bin pkg-config autoconf automake \
            libffi-dev gettext libssl-dev cmake ant python3-dev zip unzip openjdk-17-jdk

      - name: Build APK
        run: |
          pip install --upgrade pip
          pip install "cython<3.0" buildozer virtualenv setuptools
          # Ин фармон файлҳои вазнинро, ки боиси хато мешаванд, пешакӣ нест мекунад
          find . -name "*test*" -type d -exec rm -rf {} + || true
          yes | buildozer -v android debug
        env:
          BUILDOZER_ALLOW_KIVY_ITERABLE_ERROR: 1

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: NexusBoost-App
          path: bin/*.apk
